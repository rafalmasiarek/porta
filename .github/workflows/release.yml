name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            out: porta-linux-amd64
          - goos: darwin
            goarch: amd64
            out: porta-darwin-amd64
          - goos: windows
            goarch: amd64
            out: porta-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build binary
        run: |
          VERSION="${GITHUB_REF_NAME}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" \
            -o ${{ matrix.out }} ./cmd/porta

      - name: Generate checksums
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          sha256sum porta-linux-amd64 > SHA256SUMS.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: ${{ matrix.out }}

      - name: Upload checksum artifact
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        uses: actions/upload-artifact@v4
        with:
          name: porta-checksums
          path: SHA256SUMS.txt

  sanity:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download linux binary
        uses: actions/download-artifact@v4
        with:
          name: porta-linux-amd64
          path: dist

      - name: Make binary executable
        run: chmod +x dist/porta-linux-amd64

      - name: Install sanityctl
        run: |
          set -euo pipefail
          asset="sanityctl-linux-amd64"
          base="https://github.com/rafalmasiarek/py-sanityctl/releases/download/latest"

          curl -fsSL -o /tmp/"$asset" "$base/$asset"
          curl -fsSL -o /tmp/SHA256SUMS.txt "$base/SHA256SUMS.txt"
          (
            cd /tmp
            grep " $asset\$" SHA256SUMS.txt | sha256sum -c -
          )
          install -m 0755 /tmp/"$asset" /usr/local/bin/sanityctl
          sanityctl --help

      - name: Run sanity checks
        run: |
          set -euo pipefail
          sanityctl run \
            -f build-porta-sanity.yaml \
            --summary table \
            --output json > sanityctl-report.json

      - name: Upload sanity report artifact
        uses: actions/upload-artifact@v4
        with:
          name: sanityctl-report
          path: sanityctl-report.json

  release:
    needs: [build, sanity]
    runs-on: ubuntu-latest

    steps:
      - name: Download linux artifact
        uses: actions/download-artifact@v4
        with:
          name: porta-linux-amd64
          path: release

      - name: Download darwin artifact
        uses: actions/download-artifact@v4
        with:
          name: porta-darwin-amd64
          path: release

      - name: Download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: porta-windows-amd64.exe
          path: release

      - name: Download sanity report artifact
        uses: actions/download-artifact@v4
        with:
          name: sanityctl-report
          path: release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/porta-linux-amd64
            release/porta-darwin-amd64
            release/porta-windows-amd64.exe
            release/sanityctl-report.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update_homebrew_formula:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download Darwin release asset
        run: |
          curl -L \
            -o porta-darwin-amd64 \
            "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/porta-darwin-amd64"

      - name: Calculate SHA256
        id: sha
        run: |
          SHA=$(sha256sum porta-darwin-amd64 | awk '{print $1}')
          echo "sha256=${SHA}" >> "${GITHUB_OUTPUT}"

      - name: Update Homebrew formula
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          SHA="${{ steps.sha.outputs.sha256 }}"

          mkdir -p Homebrew-Formula

          cat > Homebrew-Formula/porta.rb <<EOF
          class Porta < Formula
            desc "Portable automation runtime with USB triggers, hooks, and offline-first execution"
            homepage "https://github.com/${{ github.repository }}"
            url "https://github.com/${{ github.repository }}/releases/download/${TAG}/porta-darwin-amd64"
            sha256 "${SHA}"
            version "${VERSION}"

            def install
              bin.install "porta-darwin-amd64" => "porta"
            end
          end
          EOF

      - name: Commit updated formula
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Homebrew-Formula/porta.rb
          git diff --cached --quiet || git commit -m "Update Homebrew formula for ${GITHUB_REF_NAME}"
          git push
